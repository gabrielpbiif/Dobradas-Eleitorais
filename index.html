<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dobradas Eleitorais RJ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--accent:#e31215;--accent2:#2ec0ff;--text:#f0f0f8;--muted:#6b6b85;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#a855f7;--orange:#f97316}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
header{padding:1.2rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#fff;flex-shrink:0}
header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-0.02em}
header p{font-size:0.75rem;color:var(--muted)}
.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 57px)}
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-top h2{font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.2s}
.search:focus{border-color:var(--accent2)}
.search::placeholder{color:var(--muted)}
.compare-bar{padding:8px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0;min-height:40px;flex-wrap:wrap}
.compare-chip{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 8px 3px 10px;font-size:0.7rem;font-family:'DM Mono',monospace;white-space:nowrap}
.compare-chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;line-height:1;padding:0 0 0 2px}
.compare-chip button:hover{color:var(--red)}
.btn-compare{margin-left:auto;padding:4px 12px;border-radius:20px;border:1px solid var(--accent2);background:transparent;color:var(--accent2);cursor:pointer;font-family:'DM Mono',monospace;font-size:0.7rem;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.btn-compare:hover{background:var(--accent2);color:#000}
.btn-compare:disabled{border-color:var(--border);color:var(--muted);cursor:default}
.dep-list{overflow-y:auto;flex:1;padding:6px}
.dep-card{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all 0.12s;margin-bottom:2px;border:1px solid transparent;position:relative}
.dep-card:hover{background:var(--surface2)}
.dep-card.active{background:var(--surface2);border-color:var(--accent2)}
.dep-card.in-compare{border-color:rgba(168,85,247,0.5);background:rgba(168,85,247,0.05)}
.dep-photo{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.7rem;color:var(--muted)}
.dep-photo img{width:100%;height:100%;object-fit:cover}
.dep-info{flex:1;min-width:0}
.dep-name{font-size:0.8rem;font-weight:500;white-space:normal;line-height:1.3}
.dep-meta{font-size:0.67rem;color:var(--muted);margin-top:1px}
.dep-badge{font-size:0.6rem;padding:2px 5px;border-radius:3px;font-family:'DM Mono',monospace;flex-shrink:0}
.badge-eleito{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-suplente{background:rgba(245,158,11,0.15);color:var(--amber)}
.badge-nao{background:rgba(239,68,68,0.15);color:var(--red)}
.main{overflow-y:auto;padding:1.5rem}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:1rem;opacity:0.35}
.empty-icon{font-size:2.5rem}
.empty h3{font-family:'Syne',sans-serif;font-size:1rem}
.empty p{font-size:0.82rem;color:var(--muted);text-align:center;max-width:260px}
/* DEP DETAIL */
.dep-header{display:flex;align-items:flex-start;gap:1.2rem;margin-bottom:1.5rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)}
.dep-avatar-lg{width:68px;height:68px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--muted)}
.dep-avatar-lg img{width:100%;height:100%;object-fit:cover}
.dep-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-0.02em;word-break:break-word}
.dep-subtitle{font-size:0.8rem;color:var(--muted);margin-top:3px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.chip{font-size:0.67rem;padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace;border:1px solid;cursor:pointer;transition:all 0.12s}
.chip-eleito{background:rgba(34,197,94,0.08);color:var(--green);border-color:rgba(34,197,94,0.25)}
.chip-eleito.selected{background:rgba(34,197,94,0.25);border-color:var(--green)}
.chip-suplente{background:rgba(245,158,11,0.08);color:var(--amber);border-color:rgba(245,158,11,0.25)}
.chip-suplente.selected{background:rgba(245,158,11,0.25);border-color:var(--amber)}
.chip-nao{background:rgba(239,68,68,0.08);color:var(--red);border-color:rgba(239,68,68,0.25)}
.chip-nao.selected{background:rgba(239,68,68,0.25);border-color:var(--red)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem}
.stat-label{font-size:0.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.stat-value{font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:500;word-break:break-word}
.stat-sub{font-size:0.67rem;color:var(--muted);margin-top:2px}
/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-header{padding:0.85rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.table-title{font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted)}
.table-count{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--accent2)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:400px}
thead th{padding:0.55rem 0.9rem;font-size:0.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;text-align:left;border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap}
thead th:not(:first-child):not(:nth-child(2)){text-align:right}
tbody tr{border-bottom:1px solid rgba(42,42,56,0.5);transition:background 0.1s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
td{padding:0.55rem 0.9rem;font-size:0.8rem;white-space:nowrap}
td.rank{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.67rem;width:32px}
td.city{font-weight:500}
td.num{text-align:right;font-family:'DM Mono',monospace;font-size:0.75rem}
.bar-cell{padding:0.55rem 0.9rem;width:80px}
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar{height:4px;border-radius:2px;min-width:1px;transition:width 0.3s}
/* COMPARE */
.compare-grid{display:grid;gap:1rem;margin-bottom:1.5rem}
.compare-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem}
.compare-col-header{display:flex;align-items:center;gap:10px;margin-bottom:0.8rem;padding-bottom:0.8rem;border-bottom:1px solid var(--border)}
.compare-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;flex-shrink:0}
.compare-col-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem}
.compare-col-sub{font-size:0.7rem;color:var(--muted);margin-top:2px}
.compare-table-wrap{overflow-x:auto;margin-top:0.8rem}
/* Cores para comparação */
.c1{--ccolor:var(--accent2)}
.c2{--ccolor:var(--purple)}
.c3{--ccolor:var(--orange)}
.c4{--ccolor:var(--green)}
.c5{--ccolor:var(--amber)}
.andre-destaque{border-color:rgba(245,200,66,0.4)!important;background:rgba(245,200,66,0.04)!important}
.andre-destaque .dep-name{color:var(--gold,#f5c842)}
.compare-avatar.c1{background:rgba(46,192,255,0.15);color:var(--accent2);border:2px solid rgba(46,192,255,0.4)}
.compare-avatar.c2{background:rgba(168,85,247,0.15);color:var(--purple);border:2px solid rgba(168,85,247,0.4)}
.compare-avatar.c3{background:rgba(249,115,22,0.15);color:var(--orange);border:2px solid rgba(249,115,22,0.4)}
.compare-avatar.c4{background:rgba(34,197,94,0.15);color:var(--green);border:2px solid rgba(34,197,94,0.4)}
.compare-avatar.c5{background:rgba(245,158,11,0.15);color:var(--amber);border:2px solid rgba(245,158,11,0.4)}
</style>
</head>
<body>
<header>
  <div class="logo">RJ</div>
  <div>
    <h1>Dobradas Eleitorais</h1>
    <p>Votação completa por município · 92 municípios · Rio de Janeiro</p>
  </div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <h2>Deputados</h2>
      <input class="search" type="text" placeholder="Buscar..." id="search">
    </div>
    <div class="compare-bar" id="compare-bar">
      <span style="font-size:0.67rem;color:var(--muted);font-family:'DM Mono',monospace">COMPARAR:</span>
      <div id="compare-chips" style="display:flex;gap:4px;flex-wrap:wrap;flex:1"></div>
      <button class="btn-compare" id="btn-compare" disabled onclick="renderCompare()">Comparar ↗</button>
    </div>
    <div class="dep-list" id="dep-list"></div>
  </aside>
  <main class="main" id="main-panel">
    <div class="empty">
      <div class="empty-icon">🗳️</div>
      <h3>Selecione um deputado</h3>
      <p>Clique para ver votação · Segure Ctrl para adicionar à comparação</p>
    </div>
  </main>
</div>

let currentDep=null, currentEleicao=null, compareList=[];
// compareList agora guarda objetos {nome, eleicaoIdx}
const COLORS=['c1','c2','c3','c4','c5'];

function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function sitC(s){const u=(s||'').toUpperCase();if(u.includes('ELEITO')&&!u.includes('NAO')&&!u.includes('NÃO'))return'eleito';if(u.includes('SUPLENTE'))return'suplente';return'nao'}
function fmt(n){return(n||0).toLocaleString('pt-BR')}
function totalDep(dep){let t=0;dep.eleicoes.forEach(e=>Object.values(e.votos).forEach(v=>t+=v));return t}

// Dropdown de seleção de eleição
let dropdownNome=null;
function showDropdown(nome, cardEl){
  closeDropdown();
  dropdownNome=nome;
  const dep=DATA[nome];
  const rect=cardEl.getBoundingClientRect();
  const dd=document.createElement('div');
  dd.id='eleicao-dropdown';
  dd.style.cssText=`position:fixed;top:${rect.bottom+4}px;left:${rect.left}px;background:#1c1c26;border:1px solid #2a2a38;border-radius:8px;z-index:1000;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,0.5);overflow:hidden`;
  dd.innerHTML=`<div style="padding:6px 10px;font-size:0.65rem;color:#6b6b85;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid #2a2a38">Escolha a eleição</div>`+
    dep.eleicoes.map((e,i)=>{
      const sc=sitC(e.sit);
      const cor=sc==='eleito'?'#22c55e':sc==='suplente'?'#f59e0b':'#ef4444';
      const urnaLabel=e.nm_urna&&e.nm_urna!==nome?` · ${e.nm_urna}`:'';
      return`<div onclick="addToCompare('${nome.replace(/'/g,"\\'")}',${i})" style="padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s" onmouseover="this.style.background='#2a2a38'" onmouseout="this.style.background='transparent'">
        <span style="font-family:'DM Mono',monospace;font-size:0.75rem;color:#f0f0f8">${e.ano}</span>
        <span style="font-size:0.72rem;color:#6b6b85">${e.cargo.replace('Deputado ','Dep. ')} · ${e.partido}${urnaLabel}</span>
        <span style="margin-left:auto;font-size:0.62rem;color:${cor}">${sc==='eleito'?'ELEITO':sc==='suplente'?'SUPLENTE':'NÃO EL.'}</span>
      </div>`;
    }).join('');
  document.body.appendChild(dd);
  setTimeout(()=>document.addEventListener('click',closeDropdown,{once:true}),10);
}

function closeDropdown(){
  const dd=document.getElementById('eleicao-dropdown');
  if(dd)dd.remove();
  dropdownNome=null;
}

function addToCompare(nome,eleicaoIdx){
  closeDropdown();
  // Remover se já existe o mesmo candidato
  compareList=compareList.filter(c=>c.nome!==nome);
  if(compareList.length<5){
    compareList.push({nome,eleicaoIdx});
  }
  updateCompareBar();
  buildList(document.getElementById('search').value);
}

function buildList(filter){
  const list=document.getElementById('dep-list');
  list.innerHTML='';
  Object.keys(DATA).filter(k=>!filter||k.toLowerCase().includes(filter.toLowerCase()))
    .sort((a,b)=>a.localeCompare(b))
    .forEach(nome=>{
      const dep=DATA[nome];
      const ult=dep.eleicoes[dep.eleicoes.length-1];
      const sc=sitC(ult.sit);
      const inCmp=compareList.some(c=>c.nome===nome);
      const card=document.createElement('div');
      const isAndre=nome==='ANDRE CECILIANO';card.className='dep-card'+(currentDep===nome?' active':'')+(inCmp?' in-compare':'')+(isAndre?' andre-destaque':'');
      card.innerHTML=`<div class="dep-photo" style="padding:0;position:relative"><img src="fotos/${nome}.jpg" onerror="this.src='fotos/${nome}.jpeg';this.onerror=function(){this.remove()}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;top:0;left:0;z-index:2"><span style="position:relative;z-index:1">${initials(nome)}</span></div>
        <div class="dep-info">
          <div class="dep-name">${nome}</div>
          <div class="dep-meta">${dep.eleicoes.map(e=>e.ano).join(' · ')}</div>
        </div>
        <span class="dep-badge badge-${sc}">${sc==='eleito'?'ELEITO':sc==='suplente'?'SUPLENTE':'NÃO EL.'}</span>
        <button class="add-compare-btn" onclick="event.stopPropagation();showDropdown('${nome.replace(/'/g,"\\'")}',this)" title="Adicionar à comparação" style="background:none;border:1px solid #2a2a38;border-radius:50%;width:22px;height:22px;color:#6b6b85;cursor:pointer;font-size:14px;line-height:1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s" onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='#2a2a38';this.style.color='#6b6b85'">+</button>`;
      card.onclick=(ev)=>{
        if(!ev.target.classList.contains('add-compare-btn')){selectDep(nome);}
      };
      list.appendChild(card);
    });
}

function updateCompareBar(){
  const chips=document.getElementById('compare-chips');
  const btn=document.getElementById('btn-compare');
  const colors=['accent2','purple','orange','green','amber'];
  chips.innerHTML=compareList.map((c,i)=>{
    const e=DATA[c.nome].eleicoes[c.eleicaoIdx];
    const label=e.nm_urna&&e.nm_urna!==c.nome?e.nm_urna:c.nome.split(' ')[0];
    return`<span class="compare-chip"><span style="color:var(--${colors[i]})">${label} ${e.ano}</span><button onclick="removeCompare('${c.nome.replace(/'/g,"\\'")}')">×</button></span>`;
  }).join('');
  btn.disabled=compareList.length<2;
}

function removeCompare(nome){
  compareList=compareList.filter(c=>c.nome!==nome);
  updateCompareBar();
  buildList(document.getElementById('search').value);
}

function selectDep(nome){
  currentDep=nome;
  currentEleicao=DATA[nome].eleicoes[DATA[nome].eleicoes.length-1];
  buildList(document.getElementById('search').value);
  renderDep();
}

function renderDep(){
  if(!currentDep)return;
  const dep=DATA[currentDep];
  const el=currentEleicao;
  const entries=Object.entries(el.votos);
  const maxV=entries[0]?entries[0][1]:1;
  const totalEl=entries.reduce((a,[,v])=>a+v,0);
  const sc=sitC(el.sit);
  const barColor=sc==='eleito'?'var(--green)':sc==='suplente'?'var(--amber)':'var(--red)';
  const melhor=dep.eleicoes.reduce((a,b)=>Object.values(b.votos).reduce((x,y)=>x+y,0)>Object.values(a.votos).reduce((x,y)=>x+y,0)?b:a);
  const melhorTotal=Object.values(melhor.votos).reduce((a,b)=>a+b,0);

  document.getElementById('main-panel').innerHTML=`
    <div class="dep-header">
      <div class="dep-avatar-lg" style="padding:0;position:relative"><img src="fotos/${currentDep}.jpg" onerror="this.src='fotos/${currentDep}.jpeg';this.onerror=function(){this.remove()}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;top:0;left:0;z-index:2"><span style="position:relative;z-index:1">${initials(currentDep)}</span></div>
      <div style="flex:1">
        <div class="dep-title">${currentDep}</div>
        <div class="dep-subtitle">${dep.eleicoes.length} eleição(ões)</div>
        <div class="chips">
          ${dep.eleicoes.map(e=>{
            const sc2=sitC(e.sit);
            const isSel=e===currentEleicao;
            const displayName=e.nm_urna&&e.nm_urna!==currentDep?` · ${e.nm_urna}`:'';return`<span class="chip chip-${sc2}${isSel?' selected':''}" onclick="selecionarEleicao('${currentDep}',${e.ano},'${e.cargo}')">
              ${e.ano} ${e.cargo.replace('Deputado ','Dep. ')} ${e.partido}${displayName}
            </span>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Total (eleição atual)</div><div class="stat-value">${fmt(totalEl)}</div><div class="stat-sub">${el.ano} · ${el.cargo}</div></div>
      <div class="stat"><div class="stat-label">Municípios</div><div class="stat-value">${entries.filter(([,v])=>v>0).length}</div><div class="stat-sub">com votos</div></div>
      <div class="stat"><div class="stat-label">Maior base</div><div class="stat-value" style="font-size:0.95rem">${entries[0]?entries[0][0]:'-'}</div><div class="stat-sub">${entries[0]?fmt(entries[0][1])+' votos':''}</div></div>
      <div class="stat"><div class="stat-label">Melhor eleição</div><div class="stat-value">${melhor.ano}</div><div class="stat-sub">${fmt(melhorTotal)} votos</div></div>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">Votos por município — ${el.ano} ${el.cargo}</span>
        <span class="table-count">${entries.length} municípios</span>
      </div>
      <div class="table-scroll"><table>
        <thead><tr><th>#</th><th>Município</th><th>Votos</th><th>% total</th><th style="width:80px"></th></tr></thead>
        <tbody>${entries.map(([cidade,votos],i)=>{
          const pct=totalEl>0?((votos/totalEl)*100):0;
          const bw=Math.max(1,Math.round((votos/maxV)*76));
          return`<tr><td class="rank">${i+1}</td><td class="city">${cidade}</td><td class="num">${fmt(votos)}</td><td class="num">${pct.toFixed(1)}%</td><td class="bar-cell"><div class="bar-wrap"><div class="bar" style="width:${bw}px;background:${barColor}"></div></div></td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
}

function selecionarEleicao(nome,ano,cargo){
  const el=DATA[nome]?.eleicoes.find(e=>e.ano===ano&&e.cargo===cargo);
  if(el){currentEleicao=el;renderDep();}
}

function renderCompare(){
  if(compareList.length<2)return;

  const allMuns=new Set();
  const cols=compareList.map(({nome,eleicaoIdx})=>{
    const dep=DATA[nome];
    const el=dep.eleicoes[eleicaoIdx];
    Object.keys(el.votos).forEach(m=>allMuns.add(m));
    const total=Object.values(el.votos).reduce((a,b)=>a+b,0);
    return{nome,dep,el,total};
  });

  const munsOrdenados=[...allMuns].sort((a,b)=>{
    const sa=cols.reduce((t,c)=>t+(c.el.votos[a]||0),0);
    const sb=cols.reduce((t,c)=>t+(c.el.votos[b]||0),0);
    return sb-sa;
  });

  const panel=document.getElementById('main-panel');
  const colorsArr=['var(--accent2)','var(--purple)','var(--orange)','var(--green)','var(--amber)'];

  panel.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">
      <h2 style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800">Comparação</h2>
      <button onclick="clearCompare()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:0.75rem;font-family:'DM Sans',sans-serif">Voltar</button>
    </div>
    <div class="compare-grid" style="grid-template-columns:repeat(${Math.min(cols.length,3)},1fr)">
      ${cols.map((c,i)=>{
        const sc=sitC(c.el.sit);
        const urnaLabel=c.el.nm_urna&&c.el.nm_urna!==c.nome?`<span style="font-size:0.65rem;color:var(--muted);display:block;margin-top:2px">urna: ${c.el.nm_urna}</span>`:'';
        return`<div class="compare-col">
          <div class="compare-col-header">
            <div class="compare-avatar ${COLORS[i]}" style="padding:0;position:relative"><img src="fotos/${c.nome}.jpg" onerror="this.src='fotos/${c.nome}.jpeg';this.onerror=function(){this.remove()}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;top:0;left:0;z-index:2"><span style="position:relative;z-index:1">${initials(c.nome)}</span></div>
            <div><div class="compare-col-name" style="color:${colorsArr[i]}">${c.nome}</div>
            ${urnaLabel}
            <div class="compare-col-sub">${c.el.ano} · ${c.el.cargo.replace('Deputado ','Dep.')} · ${c.el.partido}</div></div>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:0.6rem">
            <div style="background:var(--surface2);border-radius:6px;padding:6px 10px;flex:1">
              <div style="font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">Total</div>
              <div style="font-family:'DM Mono',monospace;font-size:1rem">${fmt(c.total)}</div>
            </div>
            <div style="background:var(--surface2);border-radius:6px;padding:6px 10px;flex:1">
              <div style="font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">Situação</div>
              <div style="font-size:0.72rem;color:var(--${sc==='eleito'?'green':sc==='suplente'?'amber':'red'})">${sc==='eleito'?'ELEITO':sc==='suplente'?'SUPLENTE':'NÃO ELEITO'}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">Votos por município (ordem: maior soma)</span>
        <span class="table-count">${munsOrdenados.length} municípios</span>
      </div>
      <div class="table-scroll"><table>
        <thead><tr>
          <th>#</th><th>Município</th>
          ${cols.map((c,i)=>`<th style="color:${colorsArr[i]}">${(c.el.nm_urna&&c.el.nm_urna!==c.nome?c.el.nm_urna:c.nome).split(' ')[0]} ${c.el.ano}</th><th style="color:${colorsArr[i]};font-size:0.6rem">%</th>`).join('')}
        </tr></thead>
        <tbody>${munsOrdenados.map((mun,idx)=>{
          const cells=cols.map((c,i)=>{
            const v=c.el.votos[mun]||0;
            const pct=c.total>0?((v/c.total)*100):0;
            return`<td class="num">${fmt(v)}</td><td class="num" style="color:var(--muted)">${pct.toFixed(1)}%</td>`;
          }).join('');
          return`<tr><td class="rank">${idx+1}</td><td class="city">${mun}</td>${cells}</tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
}

function clearCompare(){
  compareList=[];
  updateCompareBar();
  buildList(document.getElementById('search').value);
  if(currentDep)renderDep();
  else document.getElementById('main-panel').innerHTML=`<div class="empty"><div class="empty-icon">🗳️</div><h3>Selecione um deputado</h3><p>Clique para ver votação · Segure Ctrl para adicionar à comparação</p></div>`;
}

document.getElementById('search').addEventListener('input',e=>buildList(e.target.value));
buildList('');
</script>
</body>
</html>
